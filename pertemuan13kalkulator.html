<!DOCTYPE html>
<html>

<head>
    <title>Kalkulator Modern</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1f2937;
        }

        .calculator {
            width: 350px;
            background: #111827;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #display {
            width: 100%;
            height: 80px;
            font-size: 32px;
            text-align: right;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            background: #374151;
            color: white;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 60px;
            font-size: 22px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .operator {
            background: #f59e0b;
            color: white;
        }

        .number {
            background: #4b5563;
            color: white;
        }

        .equal {
            background: #10b981;
            color: white;
        }

        .clear {
            background: #ef4444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="calculator">

        <input type="text" id="display" readonly>

        <div class="buttons">

            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="append('%')">%</button>
            <button class="operator" onclick="append('/')">÷</button>
            <button class="operator" onclick="append('*')">×</button>

            <button class="number" onclick="append('7')">7</button>
            <button class="number" onclick="append('8')">8</button>
            <button class="number" onclick="append('9')">9</button>
            <button class="operator" onclick="append('-')">−</button>

            <button class="number" onclick="append('4')">4</button>
            <button class="number" onclick="append('5')">5</button>
            <button class="number" onclick="append('6')">6</button>
            <button class="operator" onclick="append('+')">+</button>

            <button class="number" onclick="append('1')">1</button>
            <button class="number" onclick="append('2')">2</button>
            <button class="number" onclick="append('3')">3</button>
            <button class="equal" onclick="calculate()">=</button>

            <button class="number" onclick="append('0')">0</button>
            <button class="number" onclick="append('.')">.</button>

        </div>

    </div>

    <script>

        let display = document.getElementById("display");

        function append(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function calculate() {

            try {
                display.value = eval(display.value);
            }
            catch {
                display.value = "Error";
            }

        }

        document.addEventListener("keydown", function (e) {
                const display = document.getElementById("display");

                if (e.key === "Backspace") {
                    e.preventDefault();
                    display.value = display.value.slice(0, -1);
                }

                if (e.key === "Enter") {
                    display.value = eval(display.value);
                }

                if (e.key === "Escape") {
                    display.value = "";
                }
            });

    </script>

</body>

</html>
